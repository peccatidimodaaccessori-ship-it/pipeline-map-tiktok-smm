<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peccati Di Moda — Pipeline Map</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #05050f;
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  color: #fff;
}

/* ── BACKGROUND ── */
#bg {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 25%, rgba(130,40,200,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 85% 70%, rgba(20,90,200,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 50% 50%, rgba(200,30,90,0.07) 0%, transparent 70%),
    #05050f;
  z-index: 0;
}

#stars { position:fixed; inset:0; z-index:1; pointer-events:none; }

/* ── LAYOUT ── */
#app { position:relative; width:100vw; height:100vh; z-index:2; }

/* ── HEADER ── */
#header {
  position: absolute; top: 18px; left: 50%;
  transform: translateX(-50%);
  text-align: center; pointer-events: none; z-index: 10;
}
#header h1 {
  font-size: 12px; font-weight: 900;
  letter-spacing: 6px; text-transform: uppercase;
  color: #fff; text-shadow: 0 0 40px rgba(220,50,120,0.9);
}
#header p {
  font-size: 8px; color: rgba(255,255,255,0.25);
  letter-spacing: 3px; margin-top: 3px;
}

/* ── SVG CONNECTIONS ── */
#connections {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  z-index: 3; pointer-events: none;
  overflow: visible;
}

/* ── NODES ── */
.node {
  position: absolute;
  transform: translate(-50%, -50%);
  z-index: 5; cursor: pointer;
  transition: transform 0.25s ease;
}
.node:hover { transform: translate(-50%, -54%); }

.card {
  border-radius: 14px;
  padding: 13px 16px 11px;
  width: 140px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  backdrop-filter: blur(20px);
  transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--c), transparent);
  border-radius: 14px 14px 0 0;
}

.node:hover .card {
  border-color: var(--c);
  background: rgba(255,255,255,0.07);
  box-shadow: 0 0 40px var(--g), 0 12px 40px rgba(0,0,0,0.6);
}

.node-step {
  font-size: 7px; font-weight: 700;
  letter-spacing: 2px; color: var(--c);
  opacity: 0.65; margin-bottom: 5px;
  text-transform: uppercase;
}
.node-icon { font-size: 24px; display: block; margin-bottom: 5px; }
.node-title {
  font-size: 10px; font-weight: 800;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: #fff; margin-bottom: 2px;
}
.node-sub {
  font-size: 8px; color: var(--c);
  letter-spacing: 0.5px; opacity: 0.75;
}

/* ── DETAIL PANEL ── */
#detail {
  position: fixed; z-index: 20;
  width: 270px;
  background: rgba(6,5,20,0.97);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 16px;
  backdrop-filter: blur(30px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.9);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s ease;
  border-top: 2px solid var(--c, rgba(255,255,255,0.2));
}
#detail.on { opacity: 1; }

#det-step {
  font-size: 7px; font-weight: 700; letter-spacing: 2px;
  color: var(--c, #fff); text-transform: uppercase;
  opacity: 0.7; margin-bottom: 6px;
}
#det-title {
  font-size: 13px; font-weight: 800; color: #fff;
  margin-bottom: 8px; letter-spacing: 0.5px;
}
#det-desc {
  font-size: 10px; color: rgba(255,255,255,0.55);
  line-height: 1.65; margin-bottom: 11px;
}
#det-comps {
  margin-bottom: 10px;
}
.det-comp {
  font-size: 9px; color: rgba(255,255,255,0.45);
  padding: 3px 0;
  display: flex; align-items: flex-start; gap: 6px;
}
.det-comp::before { content: '▸'; color: var(--c, #fff); flex-shrink: 0; }
#det-files {
  display: flex; flex-wrap: wrap; gap: 4px;
  padding-top: 9px; border-top: 1px solid rgba(255,255,255,0.06);
}
.det-file {
  font-size: 8px; font-family: monospace;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 5px; padding: 2px 6px;
  color: rgba(255,255,255,0.4);
}

/* ── LEGEND ── */
#legend {
  position: fixed; bottom: 16px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 20px; align-items: center;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px; padding: 7px 18px;
  pointer-events: none; z-index: 10;
}
.leg { display:flex; align-items:center; gap:6px; font-size:8px; color:rgba(255,255,255,0.28); letter-spacing:1px; }
.leg-dot { width:7px; height:7px; border-radius:50%; }
.leg-line { width:28px; height:1px; background:rgba(255,255,255,0.25); position:relative; }
.leg-line::after { content:''; position:absolute; right:-3px; top:-3px; border:3px solid transparent; border-left:6px solid rgba(255,255,255,0.25); }

/* ── HINT ── */
#hint {
  position: fixed; bottom: 16px; right: 20px;
  font-size: 8px; color: rgba(255,255,255,0.18);
  letter-spacing: 1px; line-height: 2; pointer-events: none; z-index:10;
  text-align: right;
}
</style>
</head>
<body>

<div id="bg"></div>
<canvas id="stars"></canvas>

<div id="app">

  <div id="header">
    <h1>Peccati di Moda</h1>
    <p>TikTok Automation Pipeline</p>
  </div>

  <svg id="connections"></svg>

  <!-- Nodes injected by JS -->

</div>

<div id="detail">
  <div id="det-step"></div>
  <div id="det-title"></div>
  <div id="det-desc"></div>
  <div id="det-comps"></div>
  <div id="det-files"></div>
</div>

<div id="legend">
  <div class="leg"><div class="leg-dot" style="background:#e84393"></div>STEP</div>
  <div class="leg"><div class="leg-line"></div>FLUSSO</div>
  <div class="leg">
    <svg width="28" height="8"><line x1="0" y1="4" x2="22" y2="4" stroke="rgba(232,67,147,0.6)" stroke-width="1.5" stroke-dasharray="4,3"/><polygon points="22,1.5 28,4 22,6.5" fill="rgba(232,67,147,0.6)"/></svg>
    FEEDBACK
  </div>
</div>

<div id="hint">hover per dettagli</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

var NODES = [
  {
    id: 'trigger', step: 1, icon: '📲', title: 'Trigger', sub: 'Google Drive',
    color: '#a855f7', glow: 'rgba(168,85,247,0.35)',
    lx: 8, ly: 42,
    desc: 'Ogni video caricato nella cartella "Da processare/" su Drive attiva automaticamente la pipeline tramite push notification.',
    comps: ['Flask server riceve la notifica', 'Drive API lista i video in coda', 'Cloud Scheduler: analytics ogni lunedì 08:00'],
    files: ['server.py', 'drive.py']
  },
  {
    id: 'download', step: 2, icon: '⬇️', title: 'Download', sub: 'Video locale',
    color: '#3b82f6', glow: 'rgba(59,130,246,0.35)',
    lx: 22, ly: 42,
    desc: 'Il video viene scaricato in una directory temporanea. Il nome del file (es. anello-maia.mp4) diventa il product handle, chiave dell\'intero sistema.',
    comps: ['Download in /tmp (cancellato dopo)', 'Nome file = product handle', 'Supporta .mp4, .mov, .avi'],
    files: ['drive.py', 'main.py']
  },
  {
    id: 'context', step: 3, icon: '📊', title: 'Contesto', sub: 'Dati & Analytics',
    color: '#f59e0b', glow: 'rgba(245,158,11,0.35)',
    lx: 36, ly: 68,
    desc: 'Tre fonti di dati vengono raccolte per dare a Claude il massimo contesto: scheda Shopify, storico performance del prodotto, e i video che hanno convertito di più.',
    comps: ['Shopify: nome, prezzo, varianti, descrizione', 'product_stats.json: ordini/ROI/views per prodotto', 'winners.json: top 15 video per stile/tono'],
    files: ['shopify.py', 'storage.py', 'product_stats.json', 'winners.json']
  },
  {
    id: 'claude', step: 4, icon: '🤖', title: 'Claude AI', sub: 'Opus 4.6',
    color: '#e84393', glow: 'rgba(232,67,147,0.5)',
    lx: 50, ly: 28,
    desc: 'Claude Opus 4.6 riceve 5 frame del video + tutto il contesto. Sceglie il frame migliore per la copertina e genera caption, hashtag e frase copertina.',
    comps: ['5 frame (i primi 2 = inizio video per leggere i sottotitoli)', 'Sceglie il best_frame_index', 'Caption max 300 char, tono colloquiale', 'Hashtag 8-12, mix grande/nicchia', 'Frase copertina max 6 parole MAIUSCOLO'],
    files: ['generate.py']
  },
  {
    id: 'cover', step: 5, icon: '🎨', title: 'Copertina', sub: 'AI + Pillow',
    color: '#10b981', glow: 'rgba(16,185,129,0.35)',
    lx: 65, ly: 48,
    desc: 'Il frame scelto da Claude diventa sfondo con blur leggero. rembg isola il soggetto. La frase appare in Montserrat ExtraBold bianco — la seconda riga ha un box rosa arrotondato.',
    comps: ['rembg u2net_human_seg: segmentazione AI soggetto', 'Blur sfondo: radius 5', 'Testo bianco Montserrat ExtraBold', 'Box rosa solo seconda riga', 'ffmpeg prepende come primo frame del video'],
    files: ['cover.py', 'upload.py']
  },
  {
    id: 'tiktok', step: 6, icon: '🎵', title: 'TikTok', sub: 'Inbox / Fallback',
    color: '#06b6d4', glow: 'rgba(6,182,212,0.35)',
    lx: 79, ly: 30,
    desc: 'Upload su TikTok inbox come bozza. Se TikTok è in spam-limit, fallback automatico: copertina su GCS, caption nel Google Sheet per pubblicazione manuale.',
    comps: ['Endpoint: /v2/post/publish/inbox/video/init/', 'Polling video_id ogni 5s dopo upload', 'Fallback: copertina → GCS (30gg) → Sheet'],
    files: ['upload.py', 'sheets.py', 'storage.py']
  },
  {
    id: 'analytics', step: 7, icon: '📈', title: 'Analytics', sub: 'Performance',
    color: '#f97316', glow: 'rgba(249,115,22,0.35)',
    lx: 79, ly: 62,
    desc: 'Ogni lunedì: legge Excel da Ads Manager + Content API organico + GMV Max. Calcola score composito e aggiorna winners.json e product_stats.json per il prossimo ciclo.',
    comps: ['Excel Ads Manager: spesa/ordini/revenue per video', 'Content API: views/likes/commenti organici', 'GMV Max API: ultimi 30 giorni campagna', 'Score = ordini×15 + ROI×8 + views organiche'],
    files: ['analytics.py', 'storage.py']
  }
];

var EDGES = [
  { from:'trigger',   to:'download',  label:'video in coda',   type:'main' },
  { from:'download',  to:'context',   label:'product handle',  type:'main' },
  { from:'download',  to:'claude',    label:'frame video',     type:'main' },
  { from:'context',   to:'claude',    label:'contesto AI',     type:'main' },
  { from:'claude',    to:'cover',     label:'frame + frase',   type:'main' },
  { from:'cover',     to:'tiktok',    label:'video + cover',   type:'main' },
  { from:'tiktok',    to:'analytics', label:'video_id',        type:'main' },
  { from:'analytics', to:'claude',    label:'winners.json',    type:'feedback' }
];

// ─── STARS ───────────────────────────────────────────────────────────────────

var canvas = document.getElementById('stars');
var ctx = canvas.getContext('2d');
var starList = [];

function initStars() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  starList = [];
  for (var i = 0; i < 350; i++) {
    starList.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.1 + 0.2,
      a: Math.random() * 0.5 + 0.1,
      sp: Math.random() * 0.007 + 0.002,
      ph: Math.random() * Math.PI * 2
    });
  }
}

function animateStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  var ts = t * 0.001;
  for (var i = 0; i < starList.length; i++) {
    var s = starList[i];
    var a = s.a * (0.5 + 0.5 * Math.sin(ts * s.sp + s.ph));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, 6.2832);
    ctx.fillStyle = 'rgba(255,255,255,' + a + ')';
    ctx.fill();
  }
  requestAnimationFrame(animateStars);
}

initStars();
requestAnimationFrame(animateStars);

// ─── NODES ───────────────────────────────────────────────────────────────────

var app = document.getElementById('app');

NODES.forEach(function(n) {
  var el = document.createElement('div');
  el.className = 'node';
  el.id = 'node-' + n.id;
  el.style.cssText = 'left:' + n.lx + '%;top:' + n.ly + '%;--c:' + n.color + ';--g:' + n.glow;
  el.innerHTML =
    '<div class="card">' +
      '<div class="node-step">STEP ' + n.step + '</div>' +
      '<span class="node-icon">' + n.icon + '</span>' +
      '<div class="node-title">' + n.title + '</div>' +
      '<div class="node-sub">' + n.sub + '</div>' +
    '</div>';
  el.addEventListener('mouseenter', function(e){ showDetail(n, e); });
  el.addEventListener('mousemove',  function(e){ moveDetail(e); });
  el.addEventListener('mouseleave', function(){ hideDetail(); });
  app.appendChild(el);
});

// ─── CONNECTIONS ─────────────────────────────────────────────────────────────

var svg = document.getElementById('connections');
var W = window.innerWidth;
var H = window.innerHeight;
svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

// Arrowhead markers
var defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

function makeMarker(id, color) {
  var m = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  m.setAttribute('id', id);
  m.setAttribute('viewBox', '0 0 10 10');
  m.setAttribute('refX', '9'); m.setAttribute('refY', '5');
  m.setAttribute('markerWidth', '5'); m.setAttribute('markerHeight', '5');
  m.setAttribute('orient', 'auto-start-reverse');
  var p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  p.setAttribute('d', 'M0,2 L9,5 L0,8 Z');
  p.setAttribute('fill', color);
  m.appendChild(p);
  return m;
}

defs.appendChild(makeMarker('arr-main',     'rgba(255,255,255,0.35)'));
defs.appendChild(makeMarker('arr-feedback', 'rgba(232,67,147,0.7)'));
svg.appendChild(defs);

function getCenter(id) {
  var el = document.getElementById('node-' + id);
  var r  = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2, w: r.width, h: r.height };
}

function drawEdge(edge) {
  var s = getCenter(edge.from);
  var t = getCenter(edge.to);
  var isFB = edge.type === 'feedback';

  var dx = t.x - s.x, dy = t.y - s.y;
  var dist = Math.sqrt(dx*dx + dy*dy);
  var nx = dx/dist, ny = dy/dist;

  // Start/end at card edge (approx half-width offset)
  var pad = 68;
  var x1 = s.x + nx * pad, y1 = s.y + ny * pad;
  var x2 = t.x - nx * pad, y2 = t.y - ny * pad;

  var d;
  if (isFB) {
    // Feedback arc: big curve below everything
    var mx = (x1 + x2) / 2;
    d = 'M ' + x1 + ',' + y1 +
        ' C ' + x1 + ',' + (H * 0.88) +
        ' '   + x2 + ',' + (H * 0.88) +
        ' '   + x2 + ',' + y2;
  } else {
    var curv = dist * 0.18;
    var cpx = (x1+x2)/2 - ny * curv;
    var cpy = (y1+y2)/2 + nx * curv;
    d = 'M ' + x1 + ',' + y1 + ' Q ' + cpx + ',' + cpy + ' ' + x2 + ',' + y2;
  }

  // Line
  var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', d);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', isFB ? 'rgba(232,67,147,0.45)' : 'rgba(255,255,255,0.18)');
  path.setAttribute('stroke-width', '1.2');
  if (isFB) path.setAttribute('stroke-dasharray', '6,4');
  path.setAttribute('marker-end', 'url(#' + (isFB ? 'arr-feedback' : 'arr-main') + ')');
  svg.appendChild(path);

  // Edge label
  var totalLen = path.getTotalLength();
  var mid = path.getPointAtLength(totalLen * 0.5);
  var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', mid.x);
  text.setAttribute('y', mid.y - 7);
  text.setAttribute('text-anchor', 'middle');
  text.setAttribute('font-size', '8');
  text.setAttribute('fill', isFB ? 'rgba(232,67,147,0.6)' : 'rgba(255,255,255,0.28)');
  text.setAttribute('letter-spacing', '0.5');
  text.textContent = edge.label;
  svg.appendChild(text);

  // Animated particle
  var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('r', isFB ? '3' : '2.5');
  dot.setAttribute('fill', isFB ? '#e84393' : '#fff');
  dot.setAttribute('opacity', isFB ? '0.8' : '0.6');

  var anim = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
  var dur = (totalLen / 120).toFixed(1) + 's';
  anim.setAttribute('dur', dur);
  anim.setAttribute('repeatCount', 'indefinite');
  anim.setAttribute('calcMode', 'linear');

  var mpath = document.createElementNS('http://www.w3.org/2000/svg', 'mpath');
  // Give path an id
  var pid = 'p-' + edge.from + '-' + edge.to;
  path.setAttribute('id', pid);
  mpath.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', '#' + pid);
  anim.appendChild(mpath);
  dot.appendChild(anim);
  svg.appendChild(dot);
}

// Draw after layout
window.addEventListener('load', function() {
  EDGES.forEach(drawEdge);
});

// ─── DETAIL PANEL ────────────────────────────────────────────────────────────

var detail   = document.getElementById('detail');
var detStep  = document.getElementById('det-step');
var detTitle = document.getElementById('det-title');
var detDesc  = document.getElementById('det-desc');
var detComps = document.getElementById('det-comps');
var detFiles = document.getElementById('det-files');

function showDetail(node, e) {
  detail.style.setProperty('--c', node.color);
  detStep.textContent  = 'Step ' + node.step + ' — ' + node.sub;
  detStep.style.color  = node.color;
  detTitle.textContent = node.icon + '  ' + node.title;
  detDesc.textContent  = node.desc;

  detComps.innerHTML = node.comps.map(function(c) {
    return '<div class="det-comp" style="--c:' + node.color + '">' + c + '</div>';
  }).join('');

  detFiles.innerHTML = node.files.map(function(f) {
    return '<span class="det-file">' + f + '</span>';
  }).join('');

  detail.classList.add('on');
  moveDetail(e);
}

function moveDetail(e) {
  var dw = 270;
  var left = e.clientX + 18;
  if (left + dw > window.innerWidth - 10) left = e.clientX - dw - 18;
  var top = e.clientY - 20;
  if (top + 280 > window.innerHeight - 10) top = window.innerHeight - 290;
  detail.style.left = left + 'px';
  detail.style.top  = Math.max(10, top) + 'px';
}

function hideDetail() {
  detail.classList.remove('on');
}

// ─── RESIZE ──────────────────────────────────────────────────────────────────

window.addEventListener('resize', function() {
  initStars();
  W = window.innerWidth;
  H = window.innerHeight;
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
  // Clear and redraw edges
  while (svg.lastChild && svg.lastChild !== defs) svg.removeChild(svg.lastChild);
  EDGES.forEach(drawEdge);
});
</script>
</body>
</html>
